# dnsmasq 性能优化配置（2GB RAM）

# DNS 缓存大小（2GB内存可以设置更大）
cache-size=10000

# 并发DNS查询数
dns-forward-max=1000

# 启用DNSSEC（如果需要）
# dnssec

# 日志查询（调试用，生产环境可关闭）
# log-queries

# 异步日志
log-async=50

# 禁用负缓存（提升性能）
no-negcache

# 本地域名解析
local=/lan/
domain=lan

# 扩展hosts文件支持
expand-hosts

# 读取/etc/hosts
no-hosts
addn-hosts=/etc/hosts.dnsmasq

# DHCP 租约数量
dhcp-lease-max=253

# 快速DHCP响应
dhcp-rapid-commit
